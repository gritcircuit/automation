name: Daily YouTube & TikTok Automation

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies from requirements.txt
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "requirements.txt not found in repo" >&2
            exit 1
          fi

      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN=${{ secrets.TIKTOK_REFRESH_TOKEN }}
          POSTING_TIME=09:00
          VIDEO_DURATION=60
          CONTENT_TYPE=motivation
          THUMBNAIL_PLATFORM=${{ secrets.THUMBNAIL_PLATFORM || 'youtube' }}
          THUMBNAIL_WIDTH=1280
          THUMBNAIL_HEIGHT=720
          LOG_LEVEL=INFO
          EOF

      - name: Ensure artifact directories and placeholders
        run: |
          mkdir -p generated_content logs
          touch generated_content/.placeholder
          echo "workflow started at $(date -u)" > logs/run.log

      - name: Debug: show workspace and files
        shell: bash
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          echo "Contents of workspace dir:"
          ls -la "$GITHUB_WORKSPACE" || true

      - name: Run automation once (capture logs)
        shell: bash
        run: |
          set -o pipefail
          # Run using explicit workspace path to avoid misnamed repo folder issues
          if [ -f "$GITHUB_WORKSPACE/main.py" ]; then
            python "$GITHUB_WORKSPACE/main.py" once 2>&1 | tee -a logs/run.log
            exit ${PIPESTATUS[0]}
          else
            echo "ERROR: main.py not found in $GITHUB_WORKSPACE" >&2
            ls -la "$GITHUB_WORKSPACE"
            exit 2
          fi

      - name: Upload generated content
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-content
          path: generated_content/
          retention-days: 7

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs
          path: logs/
          retention-days: 7
