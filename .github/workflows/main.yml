name: Daily YouTube & TikTok Automation

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    env:
      # opt into Node 24 if any JS actions require it
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "requirements.txt not found; continuing without pip install"
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          # fail early if essential secrets are missing
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "Missing required secret: OPENAI_API_KEY" >&2
            exit 1
          fi
          if [ -z "${{ secrets.YOUTUBE_CLIENT_ID }}" ]; then
            echo "Missing required secret: YOUTUBE_CLIENT_ID" >&2
            exit 1
          fi
          if [ -z "${{ secrets.YOUTUBE_CLIENT_SECRET }}" ]; then
            echo "Missing required secret: YOUTUBE_CLIENT_SECRET" >&2
            exit 1
          fi
          if [ -z "${{ secrets.YOUTUBE_REFRESH_TOKEN }}" ]; then
            echo "Missing required secret: YOUTUBE_REFRESH_TOKEN" >&2
            exit 1
          fi

      - name: Create .env (securely)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          THUMBNAIL_PLATFORM: ${{ secrets.THUMBNAIL_PLATFORM }}
        run: |
          mkdir -p .github
          # write .env without printing values to logs
          printf '%s\n' \
            "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            "YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}" \
            "YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}" \
            "YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}" \
            "TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN}" \
            "TIKTOK_REFRESH_TOKEN=${TIKTOK_REFRESH_TOKEN}" \
            "TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY}" \
            "TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}" \
            "POSTING_TIME=09:00" \
            "VIDEO_DURATION=60" \
            "CONTENT_TYPE=motivation" \
            "THUMBNAIL_PLATFORM=${THUMBNAIL_PLATFORM:-youtube}" \
            "THUMBNAIL_WIDTH=1280" \
            "THUMBNAIL_HEIGHT=720" \
            "LOG_LEVEL=INFO" > .env

      - name: Prepare artifact folders
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p generated_content logs
          echo "placeholder" > generated_content/placeholder.txt
          echo "workflow started at $(date -u)" > logs/run.log
          echo "placeholder" > logs/placeholder.txt

      - name: Debug workspace (non-sensitive)
        shell: bash
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la --color=never
          echo "Contents of workspace dir:"
          ls -la "$GITHUB_WORKSPACE" || true

      - name: Run automation once (capture logs)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          pwd
          ls -la
          mkdir -p logs generated_content
          echo "placeholder" > generated_content/placeholder.txt
          echo "placeholder" > logs/placeholder.txt
          echo "Running from $(pwd)"
          if [ -f main.py ]; then
            python main.py once 2>&1 | tee -a logs/run.log
            main_exit=${PIPESTATUS[0]}
            echo "Main exit code: ${main_exit}"
            echo "Log files:"
            find logs -maxdepth 2 -type f -print || true
            echo "Generated content files:"
            find generated_content -maxdepth 2 -type f -print || true
            ls -la logs || true
            ls -la generated_content || true
            exit ${main_exit}
          else
            echo "ERROR: main.py not found in $GITHUB_WORKSPACE" >&2
            ls -la "$GITHUB_WORKSPACE"
            exit 2
          fi

      - name: Debug artifact directories
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          echo "Artifact tree at $(pwd)"
          find generated_content logs -maxdepth 2 -type f | sort || true
          ls -la generated_content || true
          ls -la logs || true

      - name: Upload generated content
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-content
          path: |
            generated_content
          if-no-files-found: warn
          retention-days: 7
        working-directory: ${{ github.workspace }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs
          path: |
            logs
          if-no-files-found: warn
          retention-days: 7
        working-directory: ${{ github.workspace }}
